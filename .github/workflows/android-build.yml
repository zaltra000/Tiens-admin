name: Android CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - ".github/workflows/android-build.yml"

jobs:
  build-android:
    name: Build Android app
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup JDK 17 (for Android build)
        if: ${{ hashFiles('android/gradlew') != '' }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Make Gradle wrapper executable
        if: ${{ hashFiles('android/gradlew') != '' }}
        run: chmod +x android/gradlew

      - name: Build Android release
        if: ${{ hashFiles('android/gradlew') != '' }}
        working-directory: android
        env:
          # قيم التوقيع اختيارية وتعتمد على ضبطك داخل Gradle
          ORG_GRADLE_PROJECT_storeFile: ${{ secrets.ANDROID_KEYSTORE_PATH }}
          ORG_GRADLE_PROJECT_storePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload APK artifact
        if: ${{ hashFiles('android/app/build/outputs/apk/release/app-release.apk') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB artifact
        if: ${{ hashFiles('android/app/build/outputs/bundle/release/app-release.aab') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab


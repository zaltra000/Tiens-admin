name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Tiens-Sudan-App-APK
          path: android/app/build/outputs/apk/debug/app-universal-debug.apk

      # Create a GitHub Release when a version tag is pushed
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-universal-debug.apk
          name: "Tiens Sudan ${{ github.ref_name }}"
          body: |
            ## Tiens Sudan App ${{ github.ref_name }}

            Download the APK file below and install it on your Android device.

            **Installation:** Download `app-universal-debug.apk`, open it on your phone, and allow installation from unknown sources if prompted.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
